<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SYS 事業ポータル</title>
<style>
  :root{--navy:#1f3a5f;--navy2:#2b4c78;--line:#e6eaf0;--muted:#6b7686;--bg:#f5f6f8;--panel:#fff;--accent:#3f7ad6}
  *{box-sizing:border-box}
  body{margin:0;font-family:"Yu Gothic","Meiryo",sans-serif;color:#1f2733;background:var(--bg)}
  a{color:inherit}
  /* サイドバー */
  .layout{display:flex;min-height:100vh}
  .side{flex:0 0 232px;background:var(--navy);color:#fff;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .side .brand{padding:18px 18px 12px;font-weight:800;font-size:16px;border-bottom:1px solid #ffffff22}
  .side .brand small{display:block;font-weight:400;font-size:11px;color:#c6d3e6;margin-top:2px}
  .side nav{flex:1;overflow:auto;padding:10px 8px}
  .side .navlabel{font-size:10px;color:#9fb2cf;letter-spacing:.08em;padding:12px 10px 4px}
  .side .item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;cursor:pointer;font-size:13.5px;color:#e7eefa}
  .side .item:hover{background:#ffffff18}
  .side .item.active{background:#ffffff28;font-weight:700}
  .side .item .cnt{margin-left:auto;font-size:11px;background:#ffffff22;border-radius:9px;padding:0 7px}
  .side .foot{padding:12px;border-top:1px solid #ffffff22;font-size:11px;color:#c6d3e6}
  .side .foot button{width:100%;margin-top:6px;background:#ffffff1a;border:1px solid #ffffff33;color:#fff;border-radius:8px;padding:6px;cursor:pointer;font-size:12px}
  /* メイン */
  .main{flex:1;min-width:0}
  .topbar{background:var(--panel);border-bottom:1px solid var(--line);padding:14px 24px;position:sticky;top:0;z-index:5}
  .topbar h1{margin:0;font-size:18px;color:var(--navy)}
  .topbar p{margin:4px 0 0;font-size:12.5px;color:var(--muted)}
  .content{padding:22px 24px;max-width:1100px}
  .bizgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}
  .biztile{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.05);transition:.12s}
  .biztile:hover{box-shadow:0 6px 18px rgba(31,58,95,.14);transform:translateY(-2px)}
  .biztile .emoji{font-size:26px}
  .biztile h3{margin:8px 0 4px;font-size:15px;color:var(--navy)}
  .biztile p{margin:0;font-size:12px;color:var(--muted);line-height:1.6}
  .biztile .foot{margin-top:10px;font-size:12px;color:var(--accent);font-weight:700}
  .intro{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:20px;margin-bottom:18px}
  .intro h2{margin:0 0 6px;font-size:16px;color:var(--navy)}
  .intro p{margin:6px 0;font-size:13px;line-height:1.8;color:#333}
  .intro .pts{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
  .intro .pt{font-size:11.5px;background:#eef2f8;color:var(--navy);border-radius:8px;padding:4px 10px}
  h2.sec{font-size:14px;color:var(--navy);margin:20px 0 10px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
  .pcard{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px;cursor:pointer;transition:.12s}
  .pcard:hover{box-shadow:0 4px 12px rgba(31,58,95,.14);transform:translateY(-1px)}
  .pcard .tag{display:inline-block;font-size:10px;padding:1px 7px;border-radius:9px;background:#eef2f8;color:var(--navy);margin-bottom:6px}
  .pcard .tag.ope{background:#eef7ea;color:#2f6b2b}
  .pcard .pname{font-weight:700;font-size:13.5px;color:var(--navy);margin-bottom:6px}
  .pbar{height:7px;background:#eef1f5;border-radius:6px;overflow:hidden;margin:6px 0}
  .pbar>span{display:block;height:100%;background:var(--accent)}
  .pcard .row{display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted);margin-top:3px}
  .pcard .alert{color:#c0392b;font-weight:700}.pcard .hold{color:#d3a017;font-weight:700}
  .toollink{display:inline-flex;align-items:center;gap:8px;background:var(--navy);color:#fff;border-radius:8px;padding:9px 14px;font-size:13px;text-decoration:none;margin-top:6px}
  /* 埋め込み */
  .embed{display:none;position:fixed;inset:0;z-index:40;background:var(--bg);flex-direction:column}
  .embed .bar{display:flex;align-items:center;gap:10px;padding:9px 16px;background:var(--navy);color:#fff}
  .embed .bar b{font-size:14px}
  .embed .bar button{background:#fff;color:var(--navy);border:0;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:13px}
  .embed iframe{flex:1;border:0;width:100%}
  /* ログイン */
  #login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:50}
  #login .box{background:#fff;border:1px solid var(--line);border-radius:12px;padding:28px;width:320px;box-shadow:0 6px 24px rgba(0,0,0,.08)}
  #login h1{font-size:16px;color:var(--navy);margin:0 0 12px}
  #login input{width:100%;padding:9px 10px;margin:6px 0;border:1px solid var(--line);border-radius:8px;font-size:14px}
  #login button{width:100%;background:var(--navy);color:#fff;border:0;border-radius:8px;padding:9px;cursor:pointer;margin-top:6px}
  .msg{font-size:11px;color:var(--muted);margin-top:8px}
  @media(max-width:820px){.side{position:static;height:auto;flex:auto;width:100%}.layout{flex-direction:column}}
</style>
</head>
<body>
<div id="login"><div class="box">
  <h1>SYS 事業ポータル ログイン</h1>
  <input id="email" type="email" placeholder="メールアドレス" autocomplete="username">
  <input id="pw" type="password" placeholder="パスワード" autocomplete="current-password">
  <button id="loginBtn">ログイン</button>
  <div class="msg" id="loginMsg"></div>
</div></div>

<div class="layout" id="app" style="display:none">
  <aside class="side">
    <div class="brand">SYS株式会社<small>事業ポータル（社内）</small></div>
    <nav id="nav"></nav>
    <div class="foot"><span id="who"></span><button id="logout">ログアウト</button></div>
  </aside>
  <div class="main">
    <div class="topbar"><h1 id="ttl">ホーム</h1><p id="sub"></p></div>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="embed" id="embed">
  <div class="bar"><button id="back">← ポータルに戻る</button><b id="embTitle"></b></div>
  <iframe id="frame" title="ツール"></iframe>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL="https://fwpkggpsonarstpeecwz.supabase.co";
const SUPABASE_ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ3cGtnZ3Bzb25hcnN0cGVlY3d6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4ODQzNzcsImV4cCI6MjA5NzQ2MDM3N30.4bb28WJ8i0IBQuZhPr91bmB91UOGnoMkrYe9588vUOM";
const db=supabase.createClient(SUPABASE_URL,SUPABASE_ANON);
const $=s=>document.querySelector(s);
const esc=s=>String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const PMBASE="index.html"; // 同一オリジンのPMツール

/* 事業レジストリ（紹介文は編集可・社内向けの短い説明） */
const BIZ=[
  {key:"vcareer",emoji:"🎓",name:"V-career（新卒就活支援）",re:/V-?career|就活|関西|メンター|キックオフ/i,
   tag:"中核事業",
   desc:"関西で自社主催の合同企業説明会を開き、学生と企業のマッチングの場を提供。メンター教育を核に、学生を継続伴走で送客する。学生無料・企業課金（外注型2社構造で職業紹介はニックが担当）。高学歴もFランも2軸で狙う。",
   pts:["合説（場の提供）","メンター教育最優先","学生無料/企業課金","中立の2社構造","関西×2軸"]},
  {key:"tsushin",emoji:"📡",name:"通信事業",re:/通信/,
   tag:"継続事業",
   desc:"通信領域の業務。現在はコンプライアンス研修の強化を最優先で推進中。",
   pts:["コンプラ研修強化"]},
  {key:"airesearch",emoji:"🤖",name:"AI研修事業",re:/AI研修|AI社内|研修/,
   tag:"新規事業",
   desc:"クライアント向けのAI社内研修を設計・提供。Claude Code等の実務導入まで含む研修ファネルを構築。",
   pts:["クライアント向けAI研修","実務導入支援"]},
  {key:"hp",emoji:"💻",name:"HP制作",re:/HP|ホームページ|LP|サイト制作/,
   tag:"制作",
   desc:"codex × Claude 連携でのHP/LP制作。将来的に全役員が制作実務を担う体制へ。",
   pts:["codex×Claude","デザイン→実装"]}
];
function bizOfName(n){ for(const b of BIZ){ if(b.re.test(n||"")) return b.key; } return "other"; }
function kindOf(n){ return /継続業務|社内タスク/.test(n||"")?"社内タスク":"プロジェクト"; }

let PROJECTS=[]; // {id,name,biz,kind,total,done,avg,late,hold,ng}
let route="home";

async function boot(){
  const {data}=await db.auth.getSession();
  if(data&&data.session){ $("#login").style.display="none"; $("#app").style.display="flex"; $("#who").textContent=data.session.user.email; await load(); }
  else { $("#login").style.display="flex"; }
}
$("#loginBtn").onclick=async()=>{
  $("#loginMsg").textContent="認証中…";
  const {data,error}=await db.auth.signInWithPassword({email:$("#email").value.trim(),password:$("#pw").value});
  if(error){ $("#loginMsg").textContent="失敗："+error.message; return; }
  $("#login").style.display="none"; $("#app").style.display="flex"; $("#who").textContent=data.session.user.email; await load();
};
$("#logout").onclick=async()=>{ await db.auth.signOut(); location.reload(); };
$("#back").onclick=()=>{ $("#embed").style.display="none"; $("#frame").src="about:blank"; };

async function load(){
  const {data:pr}=await db.from("projects").select("id,name");
  const {data:tr}=await db.from("tasks").select("project_id,level,status,progress,end_date,title");
  const byp={}; (pr||[]).forEach(p=>byp[p.id]={p,tasks:[]});
  (tr||[]).forEach(t=>{ if(byp[t.project_id]) byp[t.project_id].tasks.push(t); });
  const today=new Date(); today.setHours(0,0,0,0);
  PROJECTS=Object.values(byp).map(({p,tasks})=>{
    const L2=tasks.filter(t=>(t.level||1)===2);
    const total=L2.length,done=L2.filter(t=>t.status==="done").length;
    const avg=total?Math.round(L2.reduce((s,t)=>s+(+t.progress||0),0)/total):0;
    const late=L2.filter(t=>t.end_date&&new Date(t.end_date)<today&&t.status!=="done").length;
    const hold=L2.filter(t=>t.status==="blocked").length;
    const gates=tasks.filter(t=>/◆|ゲート/.test(t.title||"")&&t.status!=="done"&&t.end_date).map(t=>new Date(t.end_date)).sort((a,b)=>a-b);
    return {id:p.id,name:p.name||"(無題)",biz:bizOfName(p.name||""),kind:kindOf(p.name||""),total,done,avg,late,hold,ng:gates[0]};
  });
  renderNav(); go(route);
}
function projCount(bk){ return PROJECTS.filter(p=>p.biz===bk).length; }
function renderNav(){
  let h='<div class="item'+(route==="home"?" active":"")+'" onclick="go(\'home\')">🏠 ホーム</div>';
  h+='<div class="navlabel">事業</div>';
  BIZ.forEach(b=>{ const c=projCount(b.key); h+='<div class="item'+(route===b.key?" active":"")+'" onclick="go(\''+b.key+'\')">'+b.emoji+' '+esc(b.name.split("（")[0])+(c?'<span class="cnt">'+c+'</span>':'')+'</div>'; });
  const oc=projCount("other"); if(oc) h+='<div class="item'+(route==="other"?" active":"")+'" onclick="go(\'other\')">📁 その他<span class="cnt">'+oc+'</span></div>';
  h+='<div class="navlabel">ツール</div>';
  h+='<div class="item" onclick="openProj(\'\',\'PMツール（全体）\')">🗂 PMツール</div>';
  $("#nav").innerHTML=h;
}
function go(r){ route=r; renderNav();
  if(r==="home") return renderHome();
  const b=BIZ.find(x=>x.key===r);
  $("#ttl").textContent=b?b.name:"その他";
  $("#sub").textContent=b?b.tag:"分類外のプロジェクト";
  renderBiz(r,b);
}
window.go=go;
function pcardHtml(p){
  return '<div class="pcard" onclick="openProj(\''+p.id+'\',\''+esc(p.name).replace(/\x27/g,"")+'\')">'+
    '<span class="tag'+(p.kind==="社内タスク"?" ope":"")+'">'+esc(p.kind)+'</span>'+
    '<div class="pname">'+esc(p.name)+'</div>'+
    '<div class="pbar"><span style="width:'+p.avg+'%"></span></div>'+
    '<div class="row"><span>進捗 '+p.avg+'%</span><span>完了 '+p.done+'/'+p.total+'</span></div>'+
    '<div class="row">'+(p.late?'<span class="alert">延滞 '+p.late+'</span>':'<span>延滞 0</span>')+(p.hold?'<span class="hold">保留 '+p.hold+'</span>':'<span>保留 0</span>')+'<span>次G '+(p.ng?p.ng.toISOString().slice(0,10):'-')+'</span></div>'+
  '</div>';
}
function renderHome(){
  $("#ttl").textContent="SYS株式会社 事業ポータル";
  $("#sub").textContent="社内の入口。事業を選んで、紹介・進行中プロジェクト・ツールへ。";
  let h='<div class="intro"><h2>ようこそ</h2><p>各事業の概要・進行中プロジェクト・業務ツール（PM等）にここから入れます。左のナビ、または下のカードから事業を選んでください。</p></div>';
  h+='<div class="bizgrid">';
  BIZ.forEach(b=>{ const c=projCount(b.key);
    h+='<div class="biztile" onclick="go(\''+b.key+'\')"><div class="emoji">'+b.emoji+'</div><h3>'+esc(b.name)+'</h3><p>'+esc(b.desc.slice(0,70))+'…</p><div class="foot">進行中 '+c+' 件 →</div></div>';
  });
  h+='</div>';
  $("#content").innerHTML=h;
}
function renderBiz(bk,b){
  let h="";
  if(b){ h+='<div class="intro"><h2>'+b.emoji+' '+esc(b.name)+'</h2><p>'+esc(b.desc)+'</p><div class="pts">'+b.pts.map(p=>'<span class="pt">'+esc(p)+'</span>').join("")+'</div></div>'; }
  const ps=PROJECTS.filter(p=>p.biz===bk);
  h+='<h2 class="sec">進行中プロジェクト・社内タスク（'+ps.length+'）</h2>';
  h+= ps.length? '<div class="grid">'+ps.map(pcardHtml).join("")+'</div>' : '<div style="color:#6b7686;font-size:13px">この事業のプロジェクトはまだありません。</div>';
  h+='<h2 class="sec">ツール</h2><a class="toollink" href="#" onclick="openProj(\'\',\'PMツール（全体）\');return false;">🗂 PMツールを開く</a>';
  $("#content").innerHTML=h;
}
function openProj(id,name){
  $("#embTitle").textContent=name||"PMツール";
  $("#frame").src=PMBASE+(id?"?project="+encodeURIComponent(id):"");
  $("#embed").style.display="flex";
}
window.openProj=openProj;
boot();
</script>
</body>
</html>
