<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>V-career メンターポータル</title>
<style>
  :root{
    --teal:#00a8c0;--teal2:#00a8a8;--tealBright:#18a8c0;
    --ink:#12333b;--muted:#5b6b78;--line:#e6eef1;
    --bg:#f4f8fa;--panel:#ffffff;
    --green:#2fae66;--amber:#e0a020;--red:#e05a5a;
    --side1:#0e2e36;--side2:#082027;--radius:18px;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Yu Gothic","Meiryo",system-ui,sans-serif;color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased}
  img{display:block;max-width:100%}
  button{font-family:inherit}
  .app{display:flex;min-height:100vh}

  /* ===== サイドバー ===== */
  .side{flex:0 0 224px;background:linear-gradient(180deg,var(--side1),var(--side2));color:#cfe6ea;display:flex;flex-direction:column;padding:18px 14px}
  .logo{display:flex;align-items:center;gap:11px;font-weight:800;font-size:16px;padding:6px 8px 20px;color:#fff}
  .logo img{width:34px;height:34px;border-radius:9px}
  .logo small{display:block;font-size:10px;color:#7fc4cf;font-weight:500;letter-spacing:.14em;margin-top:2px}
  .nav{display:flex;flex-direction:column;gap:4px;margin-top:4px}
  .nav a{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:12px;color:#a9cdd4;text-decoration:none;font-size:13.5px;cursor:pointer;transition:.15s}
  .nav a img{width:19px;height:19px;filter:brightness(0) saturate(100%) invert(84%) sepia(15%) saturate(560%) hue-rotate(140deg) brightness(92%)}
  .nav a:hover{background:#ffffff12;color:#eafafc}
  .nav a.active{background:var(--teal);color:#fff;font-weight:700;box-shadow:0 6px 18px rgba(0,168,192,.4)}
  .nav a.active img{filter:brightness(0) invert(1)}
  .side .spacer{flex:1}
  .side .rolebadge{font-size:11px;background:#ffffff1a;color:#bfe6ec;border-radius:8px;padding:6px 10px;text-align:center;margin-bottom:8px}
  .side .logout{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:12px;color:#7fc4cf;font-size:13px;cursor:pointer;border-top:1px solid #ffffff1a}

  /* ===== メイン ===== */
  .main{flex:1;min-width:0;padding:22px 30px 46px}
  .top{display:flex;align-items:center;gap:14px;margin-bottom:20px}
  .h1{font-size:21px;font-weight:800;margin:0}
  .h1 .s{display:block;font-size:12.5px;color:var(--muted);font-weight:500;margin-top:3px}
  .search{margin-left:8px;flex:1;max-width:300px;background:#fff;border:1px solid var(--line);border-radius:24px;padding:10px 18px;color:var(--muted);font-size:13px}
  .chip{margin-left:auto;display:flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--line);border-radius:26px;padding:5px 14px 5px 6px;font-size:13px;font-weight:600}
  .chip .av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--tealBright));color:#fff;display:grid;place-items:center;font-weight:700;font-size:12px}
  .chip small{color:var(--muted);font-weight:500}

  .banner{position:relative;border-radius:22px;overflow:hidden;margin-bottom:22px;box-shadow:0 10px 30px rgba(0,120,140,.12);border:1px solid #e2eef1}
  .banner img.bg{width:100%;height:172px;object-fit:cover}
  .banner .inner{position:absolute;inset:0;display:flex;align-items:center;padding:0 34px}
  .banner .txt{flex:1;max-width:60%}
  .banner .kick{font-size:12px;font-weight:700;color:var(--teal);letter-spacing:.04em}
  .banner .big{font-size:30px;font-weight:800;line-height:1.15;margin:4px 0 6px;color:var(--ink)}
  .banner .sub{font-size:13px;color:#3d5860;margin:0 0 14px}
  .banner .cta{display:inline-flex;gap:10px}
  .banner .cta button{border:0;border-radius:24px;padding:11px 20px;font-weight:700;font-size:13px;cursor:pointer}
  .banner .cta .p{background:var(--teal);color:#fff;box-shadow:0 6px 16px rgba(0,168,192,.35)}
  .banner .cta .g{background:#ffffffcc;color:var(--ink);border:1px solid #cfe3e7}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:22px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px 18px;box-shadow:0 2px 8px rgba(20,60,70,.04)}
  .kpi .l{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:7px}
  .kpi .l i{width:9px;height:9px;border-radius:50%;background:var(--teal);display:inline-block}
  .kpi .n{font-size:28px;font-weight:800;color:var(--ink);margin-top:8px;line-height:1}

  h3.sec{font-size:15.5px;margin:0 0 12px;display:flex;align-items:center;gap:8px;font-weight:800}
  h3.sec .rt{margin-left:auto;display:flex;gap:8px}
  h3.sec a,h3.sec button.link{font-size:12px;color:var(--teal);text-decoration:none;font-weight:700;background:none;border:0;cursor:pointer}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:22px;align-items:start}
  .grid{display:grid;gap:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:0 2px 8px rgba(20,60,70,.04);transition:.15s}
  .card:hover{box-shadow:0 10px 24px rgba(20,60,70,.1)}

  .stu{display:flex;gap:13px;cursor:pointer}
  .stu .av{flex:0 0 46px;height:46px;border-radius:13px;background:#e2f5f8;color:var(--teal);display:grid;place-items:center;font-weight:800;font-size:16px}
  .stu .nm{font-weight:700;font-size:14px}
  .stu .meta{font-size:11.5px;color:var(--muted);margin:2px 0 7px}
  .tag{display:inline-block;font-size:10px;padding:2px 9px;border-radius:10px;font-weight:700}
  .tag.ok{background:#e2f5ee;color:#1f8a4c}.tag.warn{background:#fdf1d8;color:#a9791a}.tag.new{background:#e2f5f8;color:var(--teal)}.tag.done{background:#eef3f5;color:#5b6b78}
  .bar{height:7px;background:#eef3f5;border-radius:6px;overflow:hidden;margin:8px 0 4px}
  .bar>span{display:block;height:100%;background:linear-gradient(90deg,var(--teal),var(--tealBright))}
  .mini{font-size:11px;color:var(--muted)}
  .empty{color:var(--muted);font-size:13px;padding:26px;text-align:center;border:1px dashed var(--line);border-radius:14px}

  /* 役員テーブル */
  .tblwrap{overflow-x:auto;background:var(--panel);border:1px solid var(--line);border-radius:16px}
  table.ex{border-collapse:collapse;width:100%;font-size:13px;min-width:760px}
  table.ex th,table.ex td{padding:11px 14px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
  table.ex th{background:#eef6f8;color:#3d5860;font-size:12px;position:sticky;top:0}
  table.ex tr:hover td{background:#f7fcfd}
  .conf{color:#a9791a;background:#fdf1d8;border-radius:6px;padding:2px 7px;font-size:11px}

  /* ボタン */
  .btn{border:0;border-radius:12px;padding:10px 16px;font-weight:700;font-size:13px;cursor:pointer}
  .btn.p{background:var(--teal);color:#fff}
  .btn.o{background:#fff;color:var(--teal);border:1px solid #bfe0e6}

  /* モーダル */
  .modal{position:fixed;inset:0;background:#0b2027aa;display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
  .modal.on{display:flex}
  .sheet{background:#fff;border-radius:18px;width:100%;max-width:460px;padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.3);max-height:88vh;overflow:auto}
  .sheet h3{margin:0 0 14px;font-size:17px}
  .fld{margin-bottom:12px}
  .fld label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:600}
  .fld input,.fld select,.fld textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:14px;font-family:inherit}
  .fld textarea{min-height:80px;resize:vertical}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .sheet .foot{display:flex;gap:10px;justify-content:flex-end;margin-top:8px}
  .logitem{border-left:3px solid var(--teal);padding:6px 12px;margin:8px 0;background:#f6fbfc;border-radius:0 8px 8px 0}
  .logitem .lt{font-size:10px;font-weight:700;color:var(--teal)}
  .logitem .lb{font-size:13px;margin:2px 0}
  .logitem .lm{font-size:10.5px;color:var(--muted)}

  /* ログイン */
  .login{position:fixed;inset:0;background:linear-gradient(135deg,#eaf7f9,#f4f8fa);display:flex;align-items:center;justify-content:center;z-index:100}
  .login .box{background:#fff;border-radius:22px;padding:40px 36px;box-shadow:0 20px 60px rgba(0,80,95,.15);text-align:center;max-width:380px;width:92%}
  .login img{width:56px;height:56px;border-radius:14px;margin:0 auto 14px}
  .login h2{margin:0 0 4px;font-size:20px}
  .login p{color:var(--muted);font-size:13px;margin:0 0 22px}
  .gbtn{display:inline-flex;align-items:center;gap:12px;background:#fff;border:1px solid #dadce0;border-radius:12px;padding:12px 20px;font-size:14px;font-weight:600;color:#3c4043;cursor:pointer;width:100%;justify-content:center}
  .gbtn:hover{box-shadow:0 2px 8px rgba(0,0,0,.12)}
  .gbtn .g{width:20px;height:20px}
  .note{font-size:11px;color:var(--muted);margin-top:16px}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--side1);color:#fff;padding:11px 20px;border-radius:24px;font-size:13px;z-index:200;opacity:0;transition:.3s;pointer-events:none}
  .toast.on{opacity:1}
  .hidden{display:none!important}
  @media(max-width:920px){.side{display:none}.main{padding:16px}.kpis{grid-template-columns:repeat(2,1fr)}.cols{grid-template-columns:1fr}.banner .txt{max-width:100%}}
</style>
</head>
<body>

<!-- ===== ログイン ===== -->
<div class="login" id="login">
  <div class="box">
    <img src="mentor-assets/ic-logo.png" alt="">
    <h2>V-career メンターポータル</h2>
    <p>Googleアカウントでログインしてください</p>
    <button class="gbtn" id="googleBtn">
      <svg class="g" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Googleでログイン
    </button>
    <div class="note" id="loginNote"></div>
  </div>
</div>

<!-- ===== アプリ本体 ===== -->
<div class="app hidden" id="app">
  <aside class="side">
    <div class="logo"><img src="mentor-assets/ic-logo.png" alt=""><span>V-career<small>MENTOR</small></span></div>
    <nav class="nav" id="nav"></nav>
    <div class="spacer"></div>
    <div class="rolebadge" id="roleBadge"></div>
    <div class="logout" id="logoutBtn">ログアウト</div>
  </aside>

  <div class="main" id="mainArea"></div>
</div>

<div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL="https://fwpkggpsonarstpeecwz.supabase.co";
const SUPABASE_ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ3cGtnZ3Bzb25hcnN0cGVlY3d6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTk0Nzc5NDAsImV4cCI6MjAzNTA1Mzk0MH0.4bb28WJ8i0IBQuZhPr91bmB91UOGnoMkrYe9588vUOM";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const $=s=>document.querySelector(s);
const el=(t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
const toast=m=>{const t=$('#toast');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2200);};
const openModal=html=>{$('#sheet').innerHTML=html;$('#modal').classList.add('on');};
const closeModal=()=>$('#modal').classList.remove('on');
$('#modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal();});

let ME=null; // {id,email,full_name,role}

/* ---------- 認証 ---------- */
$('#googleBtn').addEventListener('click',async()=>{
  const {error}=await db.auth.signInWithOAuth({provider:'google',options:{redirectTo:location.href.split('#')[0]}});
  if(error)$('#loginNote').textContent='ログインエラー: '+error.message;
});
$('#logoutBtn').addEventListener('click',async()=>{await db.auth.signOut();location.reload();});

async function boot(){
  const {data:{session}}=await db.auth.getSession();
  if(!session){ $('#login').classList.remove('hidden'); return; }
  // プロフィール取得（トリガで作成済みのはず。無ければ少し待って再取得）
  let prof=await getProfile(session.user.id);
  if(!prof){ await new Promise(r=>setTimeout(r,1200)); prof=await getProfile(session.user.id); }
  if(!prof){
    $('#login').classList.remove('hidden');
    $('#loginNote').textContent='プロフィール未作成です。SQL(スキーマ)投入と役員設定をご確認ください。';
    return;
  }
  ME=prof;
  $('#login').classList.add('hidden');
  $('#app').classList.remove('hidden');
  renderShell();
  if(ME.role==='exec') renderExec(); else renderMentor();
}
async function getProfile(id){
  const {data}=await db.from('profiles').select('*').eq('id',id).maybeSingle();
  return data;
}
db.auth.onAuthStateChange((ev)=>{ if(ev==='SIGNED_IN') boot(); });

/* ---------- 共通シェル ---------- */
function renderShell(){
  const items = ME.role==='exec'
    ? [['ic-home','ダッシュボード'],['ic-students','全生徒'],['ic-analytics','分析'],['ic-events','イベント']]
    : [['ic-home','ホーム'],['ic-students','担当学生'],['ic-tasks','教材・研修'],['ic-events','イベント']];
  $('#nav').innerHTML=items.map((it,i)=>`<a class="${i===0?'active':''}"><img src="mentor-assets/${it[0]}.png" alt="">${it[1]}</a>`).join('');
  $('#roleBadge').textContent = ME.role==='exec' ? '役員（全件・機密可）' : 'メンター（担当のみ）';
}
const initials=n=>(n||'?').trim().slice(0,1);
const statusTag=s=>{const m={'順調':'ok','送客済':'ok','要フォロー':'warn','新規':'new'};return `<span class="tag ${m[s]||'done'}">${esc(s||'—')}</span>`;};

/* ================= メンター画面 ================= */
async function renderMentor(){
  const M=$('#mainArea');
  M.innerHTML=`
   <div class="top">
     <h1 class="h1">メンターポータル<span class="s">担当学生のフォローと面談予定</span></h1>
     <div class="chip"><span class="av">${esc(initials(ME.full_name))}</span><span>${esc(ME.full_name||ME.email)}<small>（メンター）</small></span></div>
   </div>
   <div class="banner"><img class="bg" src="mentor-assets/hero-bg.png" alt="">
     <div class="inner"><div class="txt">
       <div class="kick">今日のフォロー</div>
       <div class="big" id="bnBig">担当学生を読み込み中…</div>
       <p class="sub">生徒情報・面談記録はここから追記できます。追記は会社の顧客管理に安全に蓄積されます。</p>
       <div class="cta"><button class="p" id="addStuBtn">＋ 生徒を追加</button></div>
     </div></div>
   </div>
   <div class="kpis" id="kpis"></div>
   <h3 class="sec">担当学生（メンティー）<span class="rt"><button class="link" id="addStuBtn2">＋ 生徒を追加</button></span></h3>
   <div class="grid" id="stuList"><div class="empty">読み込み中…</div></div>`;
  $('#addStuBtn').onclick=$('#addStuBtn2').onclick=addStudentForm;

  const {data:students,error}=await db.from('students').select('*').order('created_at',{ascending:false});
  if(error){ $('#stuList').innerHTML=`<div class="empty">読み込みエラー: ${esc(error.message)}</div>`; return; }
  const list=students||[];
  $('#bnBig').textContent = `担当学生 ${list.length}名`;
  const cnt={total:list.length,warn:list.filter(s=>s.status==='要フォロー').length,soukyaku:list.filter(s=>s.status==='送客済').length,neww:list.filter(s=>s.status==='新規').length};
  $('#kpis').innerHTML=[['担当学生',cnt.total],['要フォロー',cnt.warn],['送客済',cnt.soukyaku],['新規',cnt.neww]]
    .map(k=>`<div class="kpi"><div class="l"><i></i>${k[0]}</div><div class="n">${k[1]}</div></div>`).join('');
  if(!list.length){ $('#stuList').innerHTML=`<div class="empty">まだ担当学生がいません。「＋ 生徒を追加」から登録してください。</div>`; return; }
  $('#stuList').innerHTML=list.map(s=>`
    <div class="card stu" data-id="${s.id}">
      <div class="av">${esc(initials(s.name))}</div>
      <div style="flex:1">
        <div class="nm">${esc(s.name)} ${statusTag(s.status)}</div>
        <div class="meta">${esc(s.university||'')} ${esc(s.grad_year||'')}</div>
        <div class="bar"><span style="width:${Number(s.progress)||0}%"></span></div>
        <div class="mini">就活準備度 ${Number(s.progress)||0}%</div>
      </div>
    </div>`).join('');
  document.querySelectorAll('.stu[data-id]').forEach(c=>c.onclick=()=>studentDetail(c.dataset.id,list.find(x=>x.id===c.dataset.id)));
}

function addStudentForm(){
  openModal(`<h3>生徒を追加</h3>
    <div class="fld"><label>氏名 *</label><input id="f_name" placeholder="山田 太郎"></div>
    <div class="row2">
      <div class="fld"><label>大学</label><input id="f_univ" placeholder="○○大学"></div>
      <div class="fld"><label>卒年</label><input id="f_grad" placeholder="28卒"></div>
    </div>
    <div class="row2">
      <div class="fld"><label>ステータス</label><select id="f_status"><option>新規</option><option>順調</option><option>要フォロー</option><option>送客済</option></select></div>
      <div class="fld"><label>就活準備度(%)</label><input id="f_prog" type="number" min="0" max="100" value="0"></div>
    </div>
    <div class="row2">
      <div class="fld"><label>連絡先メール</label><input id="f_email"></div>
      <div class="fld"><label>電話</label><input id="f_phone"></div>
    </div>
    <div class="foot"><button class="btn o" onclick="closeModal()">キャンセル</button><button class="btn p" id="saveStu">追加</button></div>`);
  $('#saveStu').onclick=async()=>{
    const name=$('#f_name').value.trim(); if(!name){toast('氏名を入力してください');return;}
    $('#saveStu').disabled=true;
    const {data:st,error}=await db.from('students').insert({
      name, university:$('#f_univ').value.trim()||null, grad_year:$('#f_grad').value.trim()||null,
      status:$('#f_status').value, progress:parseInt($('#f_prog').value)||0,
      email:$('#f_email').value.trim()||null, phone:$('#f_phone').value.trim()||null, created_by:ME.id
    }).select().single();
    if(error){toast('保存エラー: '+error.message);$('#saveStu').disabled=false;return;}
    const {error:ae}=await db.from('assignments').insert({mentor_id:ME.id,student_id:st.id});
    if(ae){toast('割当エラー: '+ae.message);}
    closeModal();toast('生徒を追加しました');renderMentor();
  };
}

async function studentDetail(id,s){
  openModal(`<h3>${esc(s.name)} ${statusTag(s.status)}</h3>
    <div class="mini" style="margin-bottom:10px">${esc(s.university||'')} ${esc(s.grad_year||'')}・就活準備度 ${Number(s.progress)||0}%</div>
    <div class="fld"><label>業務ログを追記</label>
      <select id="l_type" style="margin-bottom:8px"><option>面談</option><option>ES</option><option>送客</option><option>メモ</option></select>
      <textarea id="l_body" placeholder="面談内容・進捗・送客先などを記入"></textarea>
    </div>
    <div class="foot"><button class="btn o" onclick="closeModal()">閉じる</button><button class="btn p" id="saveLog">ログ追記</button></div>
    <h3 style="font-size:14px;margin:18px 0 6px">これまでのログ</h3>
    <div id="logList"><div class="mini">読み込み中…</div></div>`);
  $('#saveLog').onclick=async()=>{
    const body=$('#l_body').value.trim(); if(!body){toast('内容を入力してください');return;}
    const {error}=await db.from('student_logs').insert({student_id:id,mentor_id:ME.id,log_type:$('#l_type').value,body});
    if(error){toast('保存エラー: '+error.message);return;}
    $('#l_body').value='';toast('ログを追記しました');loadLogs(id);
  };
  loadLogs(id);
}
async function loadLogs(id){
  const {data}=await db.from('student_logs').select('*').eq('student_id',id).order('created_at',{ascending:false});
  const box=$('#logList'); if(!box)return;
  if(!data||!data.length){box.innerHTML='<div class="mini">まだログがありません</div>';return;}
  box.innerHTML=data.map(l=>`<div class="logitem"><div class="lt">${esc(l.log_type)}</div><div class="lb">${esc(l.body)}</div><div class="lm">${new Date(l.created_at).toLocaleString('ja-JP')}</div></div>`).join('');
}

/* ================= 役員画面 ================= */
async function renderExec(){
  const M=$('#mainArea');
  M.innerHTML=`
   <div class="top">
     <h1 class="h1">顧客管理（役員）<span class="s">全生徒・機密情報・担当割当を管理</span></h1>
     <div class="chip"><span class="av">${esc(initials(ME.full_name))}</span><span>${esc(ME.full_name||ME.email)}<small>（役員）</small></span></div>
   </div>
   <div class="kpis" id="kpis"></div>
   <h3 class="sec">全生徒（顧客管理DB）</h3>
   <div class="tblwrap"><table class="ex" id="exTbl"><thead><tr>
     <th>氏名</th><th>大学</th><th>卒年</th><th>ステータス</th><th>準備度</th><th>担当メンター</th><th>機密メモ</th><th></th>
   </tr></thead><tbody><tr><td colspan="8" style="text-align:center;color:#5b6b78;padding:24px">読み込み中…</td></tr></tbody></table></div>`;

  const [{data:students},{data:assigns},{data:profs},{data:confs}]=await Promise.all([
    db.from('students').select('*').order('created_at',{ascending:false}),
    db.from('assignments').select('*'),
    db.from('profiles').select('id,full_name,email'),
    db.from('student_confidential').select('*')
  ]);
  const list=students||[];
  const pmap=Object.fromEntries((profs||[]).map(p=>[p.id,p.full_name||p.email]));
  const amap={}; (assigns||[]).forEach(a=>{(amap[a.student_id]=amap[a.student_id]||[]).push(pmap[a.mentor_id]||'—');});
  const cmap=Object.fromEntries((confs||[]).map(c=>[c.student_id,c.note]));
  $('#kpis').innerHTML=[['全生徒',list.length],['要フォロー',list.filter(s=>s.status==='要フォロー').length],['送客済',list.filter(s=>s.status==='送客済').length],['メンター数',(profs||[]).length]]
    .map(k=>`<div class="kpi"><div class="l"><i></i>${k[0]}</div><div class="n">${k[1]}</div></div>`).join('');
  const tb=$('#exTbl').querySelector('tbody');
  if(!list.length){tb.innerHTML='<tr><td colspan="8" style="text-align:center;color:#5b6b78;padding:24px">生徒がまだいません</td></tr>';return;}
  tb.innerHTML=list.map(s=>`<tr>
     <td><b>${esc(s.name)}</b></td><td>${esc(s.university||'')}</td><td>${esc(s.grad_year||'')}</td>
     <td>${statusTag(s.status)}</td><td>${Number(s.progress)||0}%</td>
     <td>${esc((amap[s.id]||['未割当']).join('、'))}</td>
     <td>${cmap[s.id]?'<span class="conf">'+esc(cmap[s.id])+'</span>':'<span class="mini">—</span>'}</td>
     <td><button class="btn o" style="padding:6px 10px" data-cid="${s.id}" data-cn="${esc(s.name)}">機密編集</button></td>
   </tr>`).join('');
  tb.querySelectorAll('button[data-cid]').forEach(b=>b.onclick=()=>editConf(b.dataset.cid,b.dataset.cn,cmap[b.dataset.cid]||''));
}
function editConf(id,name,cur){
  openModal(`<h3>機密メモ — ${esc(name)}</h3>
    <div class="mini" style="margin-bottom:10px">役員のみ閲覧可（担当メンターには表示されません）</div>
    <div class="fld"><textarea id="c_note">${esc(cur)}</textarea></div>
    <div class="foot"><button class="btn o" onclick="closeModal()">キャンセル</button><button class="btn p" id="saveConf">保存</button></div>`);
  $('#saveConf').onclick=async()=>{
    const note=$('#c_note').value.trim();
    const {error}=await db.from('student_confidential').upsert({student_id:id,note,updated_at:new Date().toISOString()});
    if(error){toast('保存エラー: '+error.message);return;}
    closeModal();toast('機密メモを保存しました');renderExec();
  };
}

boot();
</script>
</body>
</html>
