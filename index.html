<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>プロジェクト管理ツール（クラウド同期版）— SOW / WBS / ガント</title>
<style>
  :root{
    --bg:#f5f6f8; --panel:#ffffff; --ink:#1f2733; --muted:#6b7686;
    --line:#e3e7ec; --accent:#2f6df0; --accent-soft:#e9f0ff;
    --ok:#16a34a; --warn:#d97706; --done:#0ea5b7; --weekend:#f3f4f7;
    --bar:#3b82f6; --bar-done:#22c55e; --bar-late:#ef4444; --milestone:#7c3aed;
    --radius:10px; --shadow:0 1px 3px rgba(20,30,50,.08),0 4px 16px rgba(20,30,50,.05);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:"Segoe UI","Yu Gothic UI",Meiryo,system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:13px}

  /* ---- Login ---- */
  #loginOverlay{position:fixed;inset:0;z-index:200;background:linear-gradient(135deg,#eef2fb,#f5f6f8);display:flex;align-items:center;justify-content:center}
  .login-card{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:30px 28px;width:340px}
  .login-card h1{font-size:18px;margin:0 0 4px;display:flex;align-items:center;gap:8px}
  .login-card .logo{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,#2f6df0,#7c3aed);display:inline-block}
  .login-card p{color:var(--muted);font-size:12px;margin:0 0 18px}
  .login-card label{font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:5px}
  .login-card input{width:100%;height:38px;border:1px solid var(--line);border-radius:8px;padding:0 10px;margin-bottom:14px}
  .login-card input:focus{outline:2px solid var(--accent-soft);border-color:var(--accent)}
  .login-card button{width:100%;height:40px;border:none;border-radius:8px;background:var(--accent);color:#fff;font-weight:700;font-size:14px}
  .login-card button:disabled{opacity:.6}
  .login-err{color:#b42318;font-size:12px;margin-top:10px;min-height:16px;text-align:center}

  /* ---- Top bar ---- */
  header{position:sticky;top:0;z-index:50;background:var(--panel);border-bottom:1px solid var(--line);box-shadow:var(--shadow)}
  .topbar{display:flex;align-items:center;gap:12px;padding:10px 18px;flex-wrap:wrap}
  .brand{font-weight:700;font-size:16px;letter-spacing:.2px;display:flex;align-items:center;gap:8px}
  .brand .logo{width:24px;height:24px;border-radius:6px;background:linear-gradient(135deg,#2f6df0,#7c3aed);display:inline-block}
  .spacer{flex:1}
  .proj-select{display:flex;align-items:center;gap:6px}
  select,.btn,input.txt{height:34px;border:1px solid var(--line);border-radius:8px;background:#fff;padding:0 10px;color:var(--ink)}
  .btn{display:inline-flex;align-items:center;gap:6px;background:#fff;font-weight:600;white-space:nowrap}
  .btn:hover{background:#f7f9fc}
  .btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn.danger{color:#b42318;border-color:#f3c6c2}
  .btn small{font-weight:400;color:var(--muted)}
  .userbox{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
  .syncdot{width:9px;height:9px;border-radius:50%;background:#cbd2db;display:inline-block;transition:background .2s}
  .syncdot.on{background:var(--ok)}
  .syncdot.busy{background:var(--warn)}
  .syncdot.err{background:var(--bar-late)}

  /* ---- Tabs ---- */
  .tabs{display:flex;gap:4px;padding:0 18px;border-top:1px solid var(--line);background:var(--panel)}
  .tab{padding:11px 18px;border:none;background:none;font-weight:600;color:var(--muted);border-bottom:2px solid transparent}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .tab:hover{color:var(--ink)}

  main{padding:18px;max-width:1500px;margin:0 auto}
  .view{display:none}
  .view.active{display:block}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:16px}
  .card h2{margin:0;padding:14px 18px;font-size:14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
  .card .body{padding:16px 18px}
  .card h2 .hint{font-weight:400;color:var(--muted);font-size:12px}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
  .field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
  .field label{font-size:12px;font-weight:600;color:var(--muted)}
  .field input,.field textarea,.field select{border:1px solid var(--line);border-radius:8px;padding:8px 10px;width:100%;background:#fff;color:var(--ink)}
  .field textarea{resize:vertical;min-height:74px;line-height:1.6}
  .field input:focus,.field textarea:focus,.field select:focus{outline:2px solid var(--accent-soft);border-color:var(--accent)}
  @media(max-width:780px){.grid2,.grid3{grid-template-columns:1fr}}

  .tablewrap{overflow-x:auto}
  table.wbs{border-collapse:collapse;width:100%;min-width:1380px}
  table.wbs th,table.wbs td{border:1px solid var(--line);padding:0;text-align:left;vertical-align:middle}
  table.wbs th{background:#f7f9fc;font-size:12px;color:var(--muted);padding:8px 10px;position:sticky;top:0;white-space:nowrap}
  table.wbs td input,table.wbs td select{border:none;background:transparent;width:100%;height:36px;padding:0 8px;color:var(--ink)}
  table.wbs td input:focus,table.wbs td select:focus{outline:2px solid var(--accent-soft);border-radius:4px}
  table.wbs td.num{text-align:center;color:var(--muted);font-variant-numeric:tabular-nums}
  table.wbs td .indent-wrap{display:flex;align-items:center}
  .lvlbtn{border:none;background:#eef1f5;color:var(--muted);width:22px;height:22px;border-radius:5px;font-size:13px;line-height:1;margin:0 1px}
  .lvlbtn:hover{background:#dfe4ea;color:var(--ink)}
  .rowdrag{cursor:default;color:#c2c8d0;padding:0 4px;user-select:none}
  .prog-cell{display:flex;align-items:center;gap:6px;padding:0 8px}
  .prog-cell input[type=range]{flex:1}
  .prog-cell .pv{width:34px;text-align:right;font-variant-numeric:tabular-nums;color:var(--muted)}
  .rowdel{border:none;background:none;color:#c2c8d0;font-size:16px}
  .rowdel:hover{color:var(--bar-late)}
  tr.lvl2 td.task .indent-wrap{padding-left:18px}
  tr.lvl3 td.task .indent-wrap{padding-left:36px}
  tr.summary{background:#fafbfd;font-weight:600}
  /* ステータス別の行背景色（level2タスク行・装飾のみ）。優先順位＝完了 > 進行中 > 保留 > 未着手(色なし)。
     入力欄/selectは background:transparent のため透過は維持される。summary行・既存スタイルは別途優先。 */
  table.wbs tr.wbs-inprogress td{background:#e8f5e9}   /* 進行中かつ未完了＝薄緑 */
  table.wbs tr.wbs-onhold td{background:#fff8e1}       /* 保留かつ未完了＝薄黄色 */
  /* 完了タスク行(level2,progress>=100)の背景を控えめに濃く。完了を最優先（進行中/保留より後に定義して上書き） */
  table.wbs tr.wbs-done td{background:#eef0f2}
  .toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}

  .kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:12px 14px;box-shadow:var(--shadow)}
  .kpi .v{font-size:22px;font-weight:700}
  .kpi .l{font-size:12px;color:var(--muted)}
  @media(max-width:780px){.kpis{grid-template-columns:repeat(2,1fr)}}

  .gantt-controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
  .gantt-scroll{overflow:auto;border:1px solid var(--line);border-radius:var(--radius);background:#fff;box-shadow:var(--shadow);max-height:72vh}
  .gantt{position:relative;display:grid}
  .g-row{display:grid;align-items:stretch;border-bottom:1px solid var(--line)}
  .g-label{position:sticky;left:0;z-index:3;background:#fff;border-right:2px solid var(--line);padding:7px 10px;font-size:13px;display:flex;align-items:center;gap:8px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  .g-label.sum{font-weight:700;background:#fafbfd}
  .g-label .who{color:var(--muted);font-size:11px}
  .g-head .g-label{z-index:6;font-weight:700;color:var(--muted);background:#f7f9fc}
  .g-head{position:sticky;top:0;z-index:5}
  .g-timeline{position:relative}
  .g-cells{display:grid;height:100%}
  .g-cell{border-right:1px solid #eef1f5;font-size:10px;color:var(--muted);text-align:center;padding-top:4px;overflow:hidden}
  .g-cell.weekend{background:var(--weekend)}
  .g-cell.month{border-left:2px solid #dfe4ea}
  .bar{position:absolute;height:20px;top:50%;transform:translateY(-50%);border-radius:6px;background:var(--bar);box-shadow:0 1px 2px rgba(0,0,0,.15);display:flex;align-items:center;overflow:visible}
  .bar .done{position:absolute;left:0;top:0;bottom:0;background:var(--bar-done);border-radius:6px 0 0 6px;opacity:.85}
  .bar.summary-bar{background:#334155;height:10px;border-radius:3px}
  .bar.late{background:var(--bar-late)}
  .bar .lab{position:absolute;left:calc(100% + 8px);white-space:nowrap;font-size:11px;color:var(--muted)}
  .milestone{position:absolute;top:50%;transform:translate(-50%,-50%) rotate(45deg);width:14px;height:14px;background:var(--milestone);border-radius:2px}
  .milestone .lab{position:absolute;left:16px;top:-2px;transform:rotate(-45deg);white-space:nowrap;font-size:11px;color:var(--milestone);font-weight:600}
  .today-line{position:absolute;top:0;bottom:0;width:2px;background:var(--bar-late);z-index:4}
  .today-line .cap{position:absolute;top:-1px;left:-15px;background:var(--bar-late);color:#fff;font-size:10px;padding:1px 5px;border-radius:4px}
  .dep-line{position:absolute;z-index:2}

  .empty{padding:40px;text-align:center;color:var(--muted)}
  .legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-top:8px}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .sw{width:14px;height:10px;border-radius:3px;display:inline-block}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1f2733;color:#fff;padding:10px 18px;border-radius:10px;box-shadow:var(--shadow);opacity:0;transition:opacity .2s,transform .2s;z-index:100;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}
  .toast.err{background:#b42318}
  #briefing{position:fixed;inset:0;z-index:300;background:rgba(20,30,50,.55);display:none;align-items:center;justify-content:center;padding:20px}
  .brf-card{background:#fff;border-radius:16px;box-shadow:var(--shadow);max-width:560px;width:100%;max-height:82vh;overflow:auto;padding:26px 28px}
  .brf-step{font-size:12px;color:var(--muted);margin-bottom:6px}
  .brf-card h2{margin:0 0 14px;font-size:18px;border:none;padding:0;background:none;color:var(--ink)}
  .brf-body{font-size:14px;line-height:1.7;color:var(--ink)}
  .brf-body ul{padding-left:20px;margin:8px 0}.brf-body li{margin:5px 0}
  .brf-card button{margin-top:20px;width:100%;height:44px;border:none;border-radius:10px;background:var(--accent);color:#fff;font-weight:700;font-size:15px;cursor:pointer}
  #sowPrint{display:none}
  #sowPrint h1{font-size:20px;margin:0 0 6px}
  #sowPrint .meta{font-size:12px;color:#555;margin-bottom:14px}
  #sowPrint table{border-collapse:collapse;width:100%}
  #sowPrint th{width:150px;text-align:left;vertical-align:top;background:#f2f2f2;border:1px solid #bbb;padding:7px 9px;font-size:13px}
  #sowPrint td{border:1px solid #bbb;padding:7px 9px;font-size:13px;line-height:1.6}
  @media print{ body.print-sow > *{display:none!important} body.print-sow #sowPrint{display:block!important} }

  @media print{
    header,.tabs,.toolbar,.gantt-controls,.no-print{display:none!important}
    .view{display:block!important} main{max-width:none} .card{break-inside:avoid;box-shadow:none} body{background:#fff}
  }
  .printtitle{display:none}
  @media print{.printtitle{display:block;font-size:20px;font-weight:700;margin-bottom:12px}}
</style>
</head>
<body>

<!-- ============ ログイン ============ -->
<div id="loginOverlay">
  <form class="login-card" id="loginForm">
    <h1><span class="logo"></span>プロジェクト管理ツール</h1>
    <p>社内メンバー専用。登録済みのメールアドレスでログインしてください。</p>
    <label>メールアドレス</label>
    <input type="email" id="loginEmail" autocomplete="username" required>
    <label>パスワード</label>
    <input type="password" id="loginPass" autocomplete="current-password" required>
    <button type="submit" id="loginBtn">ログイン</button>
    <div class="login-err" id="loginErr"></div>
  </form>
</div>

<!-- ============ アプリ本体 ============ -->
<div id="app" style="display:none">
<header>
  <div class="topbar">
    <div class="brand"><span class="logo"></span>プロジェクト管理ツール</div>
    <div class="proj-select">
      <span style="color:var(--muted);font-size:12px">案件:</span>
      <select id="projSelect" title="案件を切り替え"></select>
      <button class="btn" id="newProj" title="新規案件">＋ 新規</button>
      <button class="btn danger" id="delProj" title="この案件を削除">削除</button>
    </div>
    <div class="spacer"></div>
    <div class="userbox"><span class="syncdot" id="syncDot" title="同期状態"></span><span id="syncMsg">接続中…</span><span id="userEmail"></span></div>
    <button class="btn" id="refreshBtn" title="最新を取得">🔄 更新</button>
    <button class="btn" id="pdfBtn" title="SOWをPDFで保存（ファイル名＝プロジェクト名_SOW_バージョン）">📄 PDF出力</button>
    <button class="btn" id="logoutBtn">ログアウト</button>
  </div>
  <div class="tabs">
    <button class="tab active" data-view="sow">📄 SOW（作業範囲記述書）</button>
    <button class="tab" data-view="wbs">🗂 WBS（作業分解）</button>
    <button class="tab" data-view="gantt">📊 ガントチャート</button>
  </div>
</header>

<main>
  <div class="printtitle" id="printTitle"></div>

  <section class="view active" id="view-sow">
    <div class="card"><h2>基本情報 <span class="hint">案件の概要</span></h2><div class="body">
      <div class="grid3">
        <div class="field"><label>プロジェクト名</label><input id="sow_name" placeholder="例：◯◯社 インバウンドサイト制作"></div>
        <div class="field"><label>クライアント / 発注者</label><input id="sow_client" placeholder="株式会社◯◯"></div>
        <div class="field"><label>受注者</label><input id="sow_vendor" placeholder="SYS株式会社"></div>
        <div class="field"><label>作成日</label><input type="date" id="sow_date"></div>
        <div class="field"><label>プロジェクト責任者（PM）</label><input id="sow_pm"></div>
        <div class="field"><label>バージョン</label><input id="sow_ver" placeholder="v1.0"></div>
      </div><div id="sowUpdated" style="font-size:12px;color:#6b7686;margin-top:8px"></div></div></div>
    <div class="card"><h2>背景・目的</h2><div class="body">
      <div class="field"><label>背景 / 課題</label><textarea id="sow_bg"></textarea></div>
      <div class="field"><label>目的 / ゴール</label><textarea id="sow_goal"></textarea></div></div></div>
    <div class="card"><h2>スコープ <span class="hint">作業範囲の明確化</span></h2><div class="body grid2">
      <div class="field"><label>対象範囲（In Scope）</label><textarea id="sow_in"></textarea></div>
      <div class="field"><label>対象外（Out of Scope）</label><textarea id="sow_out"></textarea></div></div></div>
    <div class="card"><h2>成果物・前提条件・体制</h2><div class="body">
      <div class="field"><label>成果物（Deliverables）</label><textarea id="sow_deliv"></textarea></div>
      <div class="grid2">
        <div class="field"><label>前提条件 / 制約</label><textarea id="sow_assume"></textarea></div>
        <div class="field"><label>体制 / 役割分担</label><textarea id="sow_team"></textarea></div>
      </div></div></div>
    <div class="card"><h2>スケジュール・費用</h2><div class="body">
      <div class="grid3">
        <div class="field"><label>開始予定日</label><input type="date" id="sow_start"></div>
        <div class="field"><label>完了予定日</label><input type="date" id="sow_end"></div>
        <div class="field"><label>契約金額（税抜）</label><input id="sow_cost" placeholder="¥1,000,000"></div>
      </div>
      <div class="grid2">
        <div class="field"><label>支払条件</label><textarea id="sow_pay"></textarea></div>
        <div class="field"><label>主要マイルストーン</label><textarea id="sow_ms"></textarea></div>
      </div>
      <div class="field"><label>備考 / リスク・変更管理</label><textarea id="sow_note"></textarea></div></div></div>
  </section>

  <section class="view" id="view-wbs">
    <div class="kpis" id="wbsKpis"></div>
    <div class="card"><h2>WBS <span class="hint">開始/終了日と進捗を入力するとガントに反映。編集は自動でクラウド同期されます</span></h2><div class="body">
      <div class="toolbar no-print" style="margin-bottom:12px">
        <button class="btn primary" id="addTask">＋ タスク追加</button>
        <label style="font-size:12px;color:var(--muted)">担当者：
          <select id="wbsFilterAssignee"><option value="">全員</option></select></label>
        <label style="font-size:12px;color:var(--muted)">並び順：
          <select id="wbsSortOrder">
            <option value="wbs">WBS順</option>
            <option value="start">開始日が早い順</option>
            <option value="end">終了日が早い順</option>
          </select></label>
        <label style="font-size:12px;color:var(--muted)">状態：
          <select id="wbsFilterStatus">
            <option value="">すべて</option>
            <option value="done">完了</option>
            <option value="st:notstarted">未着手</option>
            <option value="st:inprogress">進行中</option>
            <option value="st:blocked">保留</option>
          </select></label>
        <span style="color:var(--muted);font-size:12px">レベル：⇤/⇥ ｜ 並べ替え：⇧/⇩</span>
      </div>
      <div class="tablewrap"><table class="wbs">
        <thead><tr>
          <th style="width:42px">#</th><th style="min-width:300px">タスク名</th><th style="width:110px">担当者</th>
          <th style="width:140px">開始日</th><th style="width:140px">終了日</th><th style="width:56px">日数</th>
          <th style="width:150px">進捗</th><th style="width:120px">ステータス</th><th style="width:80px">先行</th><th style="width:210px">タスク（作業ガイド）</th><th style="width:220px">成果物 / 納品物</th><th style="width:44px"></th>
        </tr></thead>
        <tbody id="wbsBody"></tbody>
      </table></div>
    </div></div>
  </section>

  <section class="view" id="view-gantt">
    <div class="card"><h2>ガントチャート <span class="hint">WBSの日付から自動生成</span></h2><div class="body">
      <div class="gantt-controls no-print">
        <label style="font-size:12px;color:var(--muted)">表示単位：
          <select id="ganttScale"><option value="day">日</option><option value="week" selected>週</option></select></label>
        <label style="font-size:12px;color:var(--muted)"><input type="checkbox" id="showDeps" checked> 依存線</label>
        <button class="btn" id="zoomOut">－</button><button class="btn" id="zoomIn">＋</button>
      </div>
      <div class="gantt-scroll" id="ganttScroll"><div id="ganttArea"></div></div>
      <div class="legend">
        <span><i class="sw" style="background:var(--bar)"></i>予定</span>
        <span><i class="sw" style="background:var(--bar-done)"></i>進捗</span>
        <span><i class="sw" style="background:#334155"></i>サマリ</span>
        <span><i class="sw" style="background:var(--milestone);transform:rotate(45deg)"></i>マイルストーン</span>
        <span><i class="sw" style="background:var(--bar-late)"></i>遅延</span>
        <span><i class="sw" style="background:var(--bar-late);width:3px"></i>本日</span>
      </div>
    </div></div>
  </section>
</main>
</div>

<div class="toast" id="toast"></div>
<div id="briefing"><div class="brf-card"><div class="brf-step" id="brfStep"></div><h2 id="brfTitle"></h2><div class="brf-body" id="brfBody"></div><button id="brfBtn">了解 → 次へ</button></div></div>
<div id="sowPrint"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
"use strict";

const $ = s => document.querySelector(s);

function uuidv4(){ const b=crypto.getRandomValues(new Uint8Array(16)); b[6]=(b[6]&0x0f)|0x40; b[8]=(b[8]&0x3f)|0x80;
  const h=[...b].map(x=>x.toString(16).padStart(2,"0")); return `${h[0]}${h[1]}${h[2]}${h[3]}-${h[4]}${h[5]}-${h[6]}${h[7]}-${h[8]}${h[9]}-${h[10]}${h[11]}${h[12]}${h[13]}${h[14]}${h[15]}`; }
function toast(msg,isErr){ const t=$("#toast"); t.textContent=msg; t.className="toast show"+(isErr?" err":""); clearTimeout(t._h); t._h=setTimeout(()=>t.className="toast",2200); }
function parseDate(s){ if(!s) return null; const d=new Date(s+"T00:00:00"); return isNaN(d)?null:d; }
function fmt(d){ return d.toISOString().slice(0,10); }
function dayDiff(a,b){ return Math.round((b-a)/86400000); }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function esc(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

/* ===================== データ読込 ===================== */
async function loadAll(){
  store={projects:{},current:null};
  const pr=await guard(db.from("projects").select("*").order("created_at",{ascending:true}),"案件の読み込み");
  const tr=await guard(db.from("tasks").select("*").order("sort_order",{ascending:true}),"タスクの読み込み");
  (pr.data||[]).forEach(p=>{ store.projects[p.id]={id:p.id,name:p.name||"(無題)",sow:p.sow||{},updated_at:p.updated_at||"",tasks:[]}; });
  (tr.data||[]).forEach(r=>{ const p=store.projects[r.project_id]; if(p)p.tasks.push(dbToTask(r)); });
  const ids=Object.keys(store.projects);
  if(ids.length){ store.current=pickInitialProject(ids); }
  else { await createProject("新規プロジェクト"); }
}
function pickInitialProject(ids){
  try{ const last=localStorage.getItem(lpKey()); if(last && store.projects[last]) return last; }catch(e){}
  let best=ids[0],bestN=-1;
  ids.forEach(id=>{ const n=store.projects[id].tasks.length; if(n>bestN){bestN=n;best=id;} }); // 空の新規プロジェクトに戻らない
  return best;
}

/* ===================== WBS ===================== */
function renderWbs(){
  const tb=$("#wbsBody"); tb.innerHTML=""; const tasks=cur().tasks;
  refreshWbsFilterOptions(tasks);
  /* 表示専用の絞り込み/並べ替え。元配列(tasks)・_ord(sort_order)・DBは一切変更しない。
     既定（全員／WBS順）では元配列そのままを順番通り描画＝従来と完全一致。 */
  let displayed = tasks.map((t,i)=>({t,i}));
  if(wbsFilterAssignee){ displayed = displayed.filter(o=>(o.t.assignee||"")===wbsFilterAssignee); }
  /* 状態フィルタ：完了=progress>=100。"st:<status値>"＝該当statusのlevel2タスクのみ表示。
     タスク(level2)のみを対象に絞り込む（フェーズ見出しlevel1は除外）。
     既定（""=すべて）では従来通り全行表示。担当者/並び順とANDで併用。 */
  if(wbsFilterStatus==="done"){ displayed = displayed.filter(o=>(o.t.level||1)===2 && (o.t.progress||0)>=100); }
  else if(wbsFilterStatus && wbsFilterStatus.startsWith("st:")){
    const wantStatus = wbsFilterStatus.slice(3);
    displayed = displayed.filter(o=>(o.t.level||1)===2 && (o.t.status||"notstarted")===wantStatus);
  }
  if(wbsSortOrder==="start" || wbsSortOrder==="end"){
    const key = wbsSortOrder==="start" ? "start" : "end";
    // 日付ソート時は階層をフラット化し日付順。日付なしは末尾、同日は元順を維持（安定）
    displayed = displayed.slice().sort((x,y)=>{
      const dx=parseDate(x.t[key]), dy=parseDate(y.t[key]);
      if(dx&&dy){ const d=dx-dy; return d!==0?d:(x.i-y.i); }
      if(dx&&!dy) return -1; if(!dx&&dy) return 1; return x.i-y.i;
    });
  }
  const flat = (wbsSortOrder!=="wbs");  // 日付ソート時はサマリ強調を無効化（フラット表示）
  displayed.forEach(({t,i})=>{
    const isSummary=!flat&&(i+1<tasks.length)&&tasks[i+1].level>t.level;
    const isL2=(t.level||1)===2;
    const isDone=isL2&&(t.progress||0)>=100;  // 完了タスク行（背景を控えめに濃く・最優先）
    // ステータス別背景（level2・未完了のみ）。完了が最優先のため done でない場合のみ付与。
    let statusCls="";
    if(isL2 && !isDone){
      const st=t.status||"notstarted";
      if(st==="inprogress") statusCls=" wbs-inprogress";   // 進行中＝薄緑
      else if(st==="blocked") statusCls=" wbs-onhold";     // 保留＝薄黄色
    }
    const tr=el("tr","lvl"+(t.level||1)+(isSummary?" summary":"")+(isDone?" wbs-done":statusCls)); tr.dataset.idx=i;
    const tdNum=el("td","num"); tdNum.textContent=wbsNumber(tasks,i); tr.appendChild(tdNum);
    const tdTask=el("td","task"); const wrap=el("div","indent-wrap");
    const drag=el("span","rowdrag"); drag.textContent="⋮⋮";
    const inName=el("textarea"); inName.value=t.title||""; inName.placeholder="タスク名"; inName.rows=2; inName.title=t.title||""; inName.style.cssText="width:100%;border:none;background:transparent;resize:vertical;font-family:inherit;font-size:13px;line-height:1.45;min-height:34px;padding:6px 8px;color:var(--ink)"; inName.oninput=()=>{t.title=inName.value; inName.title=inName.value; persistTask(t);};
    wrap.appendChild(drag); wrap.appendChild(inName); tdTask.appendChild(wrap); tr.appendChild(tdTask);
    tr.appendChild(cellInput(t,"assignee","担当"));
    tr.appendChild(cellDate(t,"start")); tr.appendChild(cellDate(t,"end"));
    const tdDur=el("td","num"); tdDur.textContent=durationOf(t); tr.appendChild(tdDur);
    const tdP=el("td"); const pc=el("div","prog-cell");
    const rng=el("input"); rng.type="range"; rng.min=0;rng.max=100;rng.step=5;rng.value=t.progress||0;
    const pv=el("span","pv"); pv.textContent=(t.progress||0)+"%";
    rng.oninput=()=>{t.progress=+rng.value; pv.textContent=t.progress+"%"; autoStatus(t); persistTask(t);};
    pc.appendChild(rng); pc.appendChild(pv); tdP.appendChild(pc); tr.appendChild(tdP);
    const tdS=el("td"); const sel=el("select");
    [["notstarted","未着手"],["inprogress","進行中"],["done","完了"],["blocked","保留"]].forEach(([v,l])=>{ const o=el("option");o.value=v;o.textContent=l;sel.appendChild(o); });
    sel.value=t.status||"notstarted"; sel.onchange=()=>{t.status=sel.value; if(sel.value==="done")t.progress=100; renderWbs(); persistTask(t);};
    tdS.appendChild(sel); tr.appendChild(tdS);
    const tdDep=el("td","num"); const depIn=el("input"); depIn.value=t.dep||""; depIn.placeholder="#"; depIn.style.textAlign="center"; depIn.title="先行WBS番号(例 1.2)"; depIn.oninput=()=>{t.dep=depIn.value; persistTask(t);}; tdDep.appendChild(depIn); tr.appendChild(tdDep);
    const tdTask2=el("td"); const tgWrap=el("div"); tgWrap.style.padding="4px 6px";
    const tgIn=el("textarea"); tgIn.value=t.task_guide||""; tgIn.placeholder="作業ガイド（URL/表示名|URL を改行区切り）"; tgIn.rows=2; tgIn.style.cssText="width:100%;border:1px solid #eef1f5;border-radius:4px;background:transparent;font-size:11px;resize:vertical;line-height:1.4;font-family:inherit";
    const tgBox=el("div");
    tgIn.oninput=()=>{t.task_guide=tgIn.value; persistTask(t); renderDelivLinks(tgBox,t.task_guide);};
    tgWrap.appendChild(tgIn); renderDelivLinks(tgBox,t.task_guide); tgWrap.appendChild(tgBox);
    tdTask2.appendChild(tgWrap); tr.appendChild(tdTask2);
    const tdDeliv=el("td"); const dWrap=el("div"); dWrap.style.padding="4px 6px";
    const dIn=el("textarea"); dIn.value=t.deliverable||""; dIn.placeholder="成果物リンク（URL または 表示名|URL を改行区切り）"; dIn.rows=2; dIn.style.cssText="width:100%;border:1px solid #eef1f5;border-radius:4px;background:transparent;font-size:11px;resize:vertical;line-height:1.4;font-family:inherit";
    const linkBox=el("div");
    dIn.oninput=()=>{t.deliverable=dIn.value; persistTask(t); renderDelivLinks(linkBox,t.deliverable);};
    dWrap.appendChild(dIn); renderDelivLinks(linkBox,t.deliverable); dWrap.appendChild(linkBox);
    tdDeliv.appendChild(dWrap); tr.appendChild(tdDeliv);
    const tdOp=el("td"); tdOp.style.cssText="white-space:nowrap;text-align:center";
    tdOp.appendChild(mkBtn("⇤",()=>{t.level=Math.max(1,(t.level||1)-1);renderWbs();persistTask(t);}));
    tdOp.appendChild(mkBtn("⇥",()=>{t.level=Math.min(3,(t.level||1)+1);renderWbs();persistTask(t);}));
    tdOp.appendChild(mkBtn("⇧",()=>moveTask(i,-1)));
    tdOp.appendChild(mkBtn("⇩",()=>moveTask(i,1)));
    const del=el("button","rowdel"); del.textContent="✕"; del.title="削除"; del.onclick=()=>deleteTask(i); tdOp.appendChild(del);
    tr.appendChild(tdOp); tb.appendChild(tr);
  });
  renderKpis();
}
/* 担当者フィルタの選択肢を現在のタスクから動的生成（重複なし）。表示専用、DB非変更。 */
function refreshWbsFilterOptions(tasks){
  const sel=$("#wbsFilterAssignee"); if(!sel)return;
  const names=[...new Set((tasks||[]).map(t=>(t.assignee||"").trim()).filter(Boolean))].sort((a,b)=>a.localeCompare(b,"ja"));
  if(wbsFilterAssignee && !names.includes(wbsFilterAssignee)) wbsFilterAssignee="";  // 該当者が消えたら全員に戻す
  sel.innerHTML="";
  const all=el("option"); all.value=""; all.textContent="全員"; sel.appendChild(all);
  names.forEach(n=>{ const o=el("option"); o.value=n; o.textContent=n; sel.appendChild(o); });
  sel.value=wbsFilterAssignee;
}
function mkBtn(label,fn){ const b=el("button","lvlbtn"); b.textContent=label; b.onclick=fn; return b; }
function cellInput(t,key,ph){ const td=el("td"); const i=el("input"); i.value=t[key]||""; i.placeholder=ph||""; i.oninput=()=>{t[key]=i.value;persistTask(t);}; td.appendChild(i); return td; }
function cellDate(t,key){ const td=el("td"); const i=el("input"); i.type="date"; i.value=t[key]||""; i.oninput=()=>{t[key]=i.value; renderWbs(); persistTask(t);}; td.appendChild(i); return td; }
/* 成果物欄：ファイル名ごとに「開く」リンクを描画（Storageに対応キーがあるもののみクリック可） */
function renderDelivLinks(box,text){
  box.innerHTML="";
  (text||"").split(/\r?\n/).map(s=>s.trim()).filter(Boolean).forEach(line=>{
    let label=line, target=line; const bar=line.search(/[|｜]/);
    if(bar>-1){ label=line.slice(0,bar).trim(); target=line.slice(bar+1).trim(); }
    const a=el("a"); const base="display:block;font-size:11px;margin-top:2px;text-decoration:none;line-height:1.4;";
    if(/^https?:\/\//i.test(target)){ // 外部リンク（Googleドキュメント/スプレッドシート/フォーム等）
      a.textContent="🔗 "+(bar>-1?label:target.replace(/^https?:\/\//,"").slice(0,46));
      a.href=target; a.target="_blank"; a.rel="noopener"; a.style.cssText=base+"color:#2f6df0;cursor:pointer";
    } else if(DELIV_MAP[target]){ // 旧Storageファイル（署名URLで開く）
      a.textContent="📄 "+label; a.href="#"; a.title="クリックで開く（ログイン者のみ）"; a.style.cssText=base+"color:#2f6df0;cursor:pointer";
      a.onclick=e=>{e.preventDefault(); openDeliverable(DELIV_MAP[target],label);};
    } else { a.textContent="• "+label; a.style.cssText=base+"color:#9aa3af;cursor:default"; }
    box.appendChild(a);
  });
}
async function openDeliverable(key,label){
  const w=window.open("about:blank","_blank"); // ユーザー操作内で先に窓を開く（ポップアップブロック回避）
  setSync("busy","ファイル取得中…");
  try{
    // Supabaseは配信時に text/plain を返すため、ファイルを取得して text/html として開く（文字化け・非描画を回避）
    const {data,error}=await db.storage.from("deliverables").download(key);
    if(error||!data) throw error||new Error("取得失敗");
    const blob=new Blob([await data.arrayBuffer()],{type:"text/html;charset=utf-8"});
    const u=URL.createObjectURL(blob);
    if(w){ w.location=u; } else { window.open(u,"_blank"); }
    setSync("on","同期済み");
  }catch(e){ if(w){try{w.close();}catch(_){}} setSync("err","表示失敗"); toast("「"+(label||key)+"」を開けません: "+(e.message||e),true); }
}
function autoStatus(t){ if(t.progress>=100)t.status="done"; else if(t.progress>0&&t.status!=="blocked")t.status="inprogress"; }
function durationOf(t){ const a=parseDate(t.start),b=parseDate(t.end); if(!a||!b)return"–"; const d=dayDiff(a,b)+1; return d<=0?"–":d; }
function wbsNumber(tasks,idx){ const c=[0,0,0]; for(let i=0;i<=idx;i++){ const lv=(tasks[i].level||1)-1; c[lv]++; for(let j=lv+1;j<3;j++)c[j]=0; } const lv=(tasks[idx].level||1)-1; return c.slice(0,lv+1).join("."); }

let taskTimers={};
function persistTask(t){ clearTimeout(taskTimers[t.id]); taskTimers[t.id]=setTimeout(()=>{ const order=cur().tasks.indexOf(t); guard(db.from("tasks").upsert(taskToRow(t,store.current,order)),"タスクの保存"); },400); }
async function addTask(){ const t={id:uuidv4(),title:"",level:1,assignee:"",start:"",end:"",progress:0,status:"notstarted",dep:"",_ord:cur().tasks.length}; cur().tasks.push(t); renderWbs(); await guard(db.from("tasks").insert(taskToRow(t,store.current,cur().tasks.length-1)),"タスクの追加"); }
async function deleteTask(i){ const t=cur().tasks[i]; cur().tasks.splice(i,1); renderWbs(); await guard(db.from("tasks").delete().eq("id",t.id),"タスクの削除"); }
async function moveTask(i,dir){ const a=cur().tasks; const j=i+dir; if(j<0||j>=a.length)return; [a[i],a[j]]=[a[j],a[i]]; a[i]._ord=i; a[j]._ord=j; renderWbs(); await guard(db.from("tasks").upsert([taskToRow(a[i],store.current,i),taskToRow(a[j],store.current,j)]),"並べ替えの保存"); }
$("#addTask").onclick=addTask;
/* 表示専用コントロール：状態を変えてWBSのみ再描画（DB/同期/ガント等には触れない） */
$("#wbsFilterAssignee").onchange=e=>{ wbsFilterAssignee=e.target.value; renderWbs(); };
$("#wbsSortOrder").onchange=e=>{ wbsSortOrder=e.target.value; renderWbs(); };
$("#wbsFilterStatus").onchange=e=>{ wbsFilterStatus=e.target.value; renderWbs(); };

/* ===================== KPI ===================== */
function renderKpis(){
  const tasks=cur().tasks;
  const leaf=tasks.filter((t,i)=>!((i+1<tasks.length)&&tasks[i+1].level>t.level));
  const total=leaf.length, done=leaf.filter(t=>t.progress>=100).length;
  const avg=total?Math.round(leaf.reduce((s,t)=>s+(+t.progress||0),0)/total):0;
  const today=new Date(); today.setHours(0,0,0,0);
  const late=leaf.filter(t=>{const e=parseDate(t.end);return e&&e<today&&(t.progress||0)<100;}).length;
  const dates=tasks.map(t=>parseDate(t.start)).filter(Boolean).concat(tasks.map(t=>parseDate(t.end)).filter(Boolean));
  let span="–"; if(dates.length){ const mn=new Date(Math.min(...dates)),mx=new Date(Math.max(...dates)); span=(dayDiff(mn,mx)+1)+"日"; }
  const k=[["タスク数",total],["完了",done+" / "+total],["全体進捗",avg+"%"],["遅延",late],["期間",span]];
  $("#wbsKpis").innerHTML=k.map(([l,v])=>`<div class="kpi"><div class="v">${v}</div><div class="l">${l}</div></div>`).join("");
}

/* ===================== ガント ===================== */
function renderGantt(){
  const area=$("#ganttArea"); area.innerHTML="";
  const allTasks=cur().tasks;
  const starts=allTasks.map(t=>parseDate(t.start)).filter(Boolean), ends=allTasks.map(t=>parseDate(t.end)).filter(Boolean);
  if(!starts.length||!ends.length){ area.innerHTML='<div class="empty">WBSで開始日・終了日を入力するとガントチャートが表示されます。</div>'; return; }
  let min=addDays(new Date(Math.min(...starts)),-2), max=addDays(new Date(Math.max(...ends)),2);
  const totalDays=dayDiff(min,max)+1, scale=$("#ganttScale").value, labelW=260;
  const grid=el("div","gantt"); grid.style.width=(labelW+totalDays*dayPx)+"px";
  const head=el("div","g-row g-head"); head.style.gridTemplateColumns=labelW+"px 1fr";
  const hl=el("div","g-label sum"); hl.textContent="タスク"; head.appendChild(hl);
  const htl=el("div","g-timeline"); const hcells=el("div","g-cells"); hcells.style.gridTemplateColumns=`repeat(${totalDays},${dayPx}px)`; hcells.style.height="34px";
  for(let i=0;i<totalDays;i++){ const dt=addDays(min,i); const c=el("div","g-cell"); const wd=dt.getDay(); if(wd===0||wd===6)c.classList.add("weekend"); if(dt.getDate()===1)c.classList.add("month");
    if(scale==="day"){ c.textContent=dt.getDate(); } else { if(wd===1||i===0){ c.textContent=(dt.getMonth()+1)+"/"+dt.getDate(); c.style.fontWeight="600"; } } hcells.appendChild(c); }
  htl.appendChild(hcells); head.appendChild(htl); grid.appendChild(head);
  allTasks.forEach((t,idx)=>{
    const a=parseDate(t.start),b=parseDate(t.end);
    const isSummary=(idx+1<allTasks.length)&&allTasks[idx+1].level>t.level;
    const row=el("div","g-row"); row.style.gridTemplateColumns=labelW+"px 1fr";
    const lab=el("div","g-label"+(isSummary?" sum":"")); lab.style.paddingLeft=(10+((t.level||1)-1)*16)+"px";
    lab.innerHTML=`<span style="overflow:hidden;text-overflow:ellipsis">${esc(wbsNumber(allTasks,idx))} ${esc(t.title||"(無題)")}</span>`;
    if(t.assignee){ const w=el("span","who"); w.textContent=t.assignee; lab.appendChild(w); } row.appendChild(lab);
    const tl=el("div","g-timeline"); const cells=el("div","g-cells"); cells.style.gridTemplateColumns=`repeat(${totalDays},${dayPx}px)`; cells.style.height="36px";
    for(let i=0;i<totalDays;i++){ const dt=addDays(min,i); const c=el("div","g-cell"); const wd=dt.getDay(); if(wd===0||wd===6)c.classList.add("weekend"); if(dt.getDate()===1)c.classList.add("month"); cells.appendChild(c); }
    tl.appendChild(cells);
    if(a&&b){ const offset=dayDiff(min,a), len=dayDiff(a,b)+1, left=offset*dayPx, width=Math.max(len*dayPx-2,4);
      const today=new Date(); today.setHours(0,0,0,0); const isLate=b<today&&(t.progress||0)<100;
      if(dayDiff(a,b)===0){ const m=el("div","milestone"); m.style.left=(left+dayPx/2)+"px"; const lb=el("span","lab"); lb.textContent=t.title||""; m.appendChild(lb); tl.appendChild(m); }
      else if(isSummary){ const bar=el("div","bar summary-bar"); bar.style.left=left+"px"; bar.style.width=width+"px"; tl.appendChild(bar); }
      else { const bar=el("div","bar"+(isLate?" late":"")); bar.style.left=left+"px"; bar.style.width=width+"px";
        const done=el("div","done"); done.style.width=(t.progress||0)+"%"; bar.appendChild(done);
        const lb=el("span","lab"); lb.textContent=(t.progress||0)+"%"; bar.appendChild(lb);
        bar.title=`${t.title}\n${t.start} → ${t.end}（${len}日）\n担当:${t.assignee||"–"} 進捗:${t.progress||0}%`; tl.appendChild(bar); }
    }
    row.appendChild(tl); grid.appendChild(row);
  });
  const today=new Date(); today.setHours(0,0,0,0);
  if(today>=min&&today<=max){ const off=dayDiff(min,today); const line=el("div","today-line"); line.style.left=(labelW+off*dayPx+dayPx/2)+"px"; const cap=el("div","cap"); cap.textContent="今日"; line.appendChild(cap); grid.appendChild(line); }
  area.appendChild(grid);
  if($("#showDeps").checked) requestAnimationFrame(()=>drawDeps(grid,allTasks,min,labelW));
}
function drawDeps(grid,tasks,min,labelW){
  const rows=grid.querySelectorAll(".g-row:not(.g-head)"); const numIndex={}; tasks.forEach((t,i)=>numIndex[wbsNumber(tasks,i)]=i);
  tasks.forEach((t,i)=>{ if(!t.dep)return; const from=numIndex[(t.dep||"").trim()]; if(from==null)return;
    const fb=parseDate(tasks[from].end), ta=parseDate(t.start); if(!fb||!ta)return;
    const fromRow=rows[from], toRow=rows[i]; if(!fromRow||!toRow)return;
    const fEnd=labelW+(dayDiff(min,fb)+1)*dayPx, tStart=labelW+dayDiff(min,ta)*dayPx;
    const y1=fromRow.offsetTop+fromRow.offsetHeight/2, y2=toRow.offsetTop+toRow.offsetHeight/2;
    const vert=el("div","dep-line"); vert.style.cssText=`left:${tStart}px;top:${Math.min(y1,y2)}px;height:${Math.abs(y2-y1)}px;border-left:1.5px dashed #94a3b8`; grid.appendChild(vert);
    const horiz=el("div","dep-line"); horiz.style.cssText=`left:${Math.min(fEnd,tStart)}px;top:${y2}px;width:${Math.abs(tStart-fEnd)}px;border-top:1.5px dashed #94a3b8`; grid.appendChild(horiz);
  });
}
$("#ganttScale").onchange=()=>{ dayPx=$("#ganttScale").value==="day"?26:14; renderGantt(); };
$("#zoomIn").onclick=()=>{ dayPx=Math.min(60,dayPx+4); renderGantt(); };
$("#zoomOut").onclick=()=>{ dayPx=Math.max(6,dayPx-4); renderGantt(); };
$("#showDeps").onchange=renderGantt;

/* ===================== リアルタイム同期 ===================== */
function subscribeRealtime(){
  if(channel) db.removeChannel(channel);
  channel=db.channel("pm-sync")
    .on("postgres_changes",{event:"*",schema:"public",table:"tasks"},onTaskChange)
    .on("postgres_changes",{event:"*",schema:"public",table:"projects"},onProjChange)
    .subscribe(status=>{ if(status==="SUBSCRIBED")setSync("on","同期済み"); });
}
function scheduleRender(){ if(editingActive){ pendingRender=true; return; } renderActive(); }
function renderActive(){ renderProjSelect(); if($("#view-sow").classList.contains("active"))renderSow(); renderWbs(); if($("#view-gantt").classList.contains("active"))renderGantt(); }
function onTaskChange(payload){
  const ev=payload.eventType, n=payload.new, o=payload.old;
  if(ev==="DELETE"){ const p=store.projects[o.project_id]; if(p){ const k=p.tasks.findIndex(x=>x.id===o.id); if(k>=0)p.tasks.splice(k,1);} }
  else { const p=store.projects[n.project_id]; if(!p)return; const t=dbToTask(n); const k=p.tasks.findIndex(x=>x.id===n.id);
    if(k>=0)p.tasks[k]=t; else p.tasks.push(t); p.tasks.sort((x,y)=>(x._ord||0)-(y._ord||0)); }
  scheduleRender();
}
function onProjChange(payload){
  const ev=payload.eventType, n=payload.new, o=payload.old;
  if(ev==="INSERT"){ if(!store.projects[n.id])store.projects[n.id]={id:n.id,name:n.name||"(無題)",sow:n.sow||{},tasks:[]}; }
  else if(ev==="UPDATE"){ const p=store.projects[n.id]; if(p){ p.name=n.name||"(無題)"; p.updated_at=n.updated_at||p.updated_at; if(!editingActive)p.sow=n.sow||{}; } }
  else if(ev==="DELETE"){ delete store.projects[o.id]; if(store.current===o.id)store.current=Object.keys(store.projects)[0]||null; }
  scheduleRender();
}
/* 入力中はリモート更新による再描画を保留（フォーカス喪失を防ぐ） */
function isField(t){ return t && t.matches && t.matches("input,textarea,select"); }
document.addEventListener("focusin",e=>{ if(isField(e.target))editingActive=true; });
document.addEventListener("focusout",e=>{ if(isField(e.target)){ clearTimeout(blurTimer); blurTimer=setTimeout(()=>{ if(!isField(document.activeElement)){ editingActive=false; if(pendingRender){ pendingRender=false; renderActive(); } } },200); } });

/* ===================== 入出力・印刷・更新 ===================== */
function renderProjSelect(){ const sel=$("#projSelect"); const keep=store.current; sel.innerHTML=""; for(const id in store.projects){ const o=el("option"); o.value=id; o.textContent=store.projects[id].name||"(無題)"; sel.appendChild(o);} sel.value=keep; }
$("#refreshBtn").onclick=async()=>{ await loadAll(); renderAll(); toast("最新を取得しました"); };
/* ---- 案件選択の記憶（毎回 新規プロジェクトに戻らない） ---- */
function lpKey(){ return "pm_lastproj_"+(currentUser?currentUser.id:"x"); }
function saveLastProject(){ try{ localStorage.setItem(lpKey(), store.current); }catch(e){} }

/* ---- 更新日時の表示 ---- */
function fmtDateTime(iso){ if(!iso)return"—"; const d=new Date(iso); if(isNaN(d))return"—"; const p=n=>String(n).padStart(2,"0"); return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate())+" "+p(d.getHours())+":"+p(d.getMinutes()); }
function updateSowMeta(){ const e=$("#sowUpdated"); if(!e)return; const v=(cur().sow&&cur().sow.ver)?("　／　版 "+cur().sow.ver):""; e.textContent="最終更新日時："+fmtDateTime(cur().updated_at)+v; }

/* ---- SOWをPDFで保存（印刷→PDF。ファイル名＝プロジェクト名_SOW_版。日本語対応） ---- */
function buildSowHtml(){
  const s=cur().sow||{}, name=cur().name||"(無題)";
  const rows=SOW_FIELDS.filter(f=>f!=="name").map(f=>{ const v=(s[f]||"").trim(); if(!v)return""; return `<tr><th>${esc(SOW_LABELS[f]||f)}</th><td>${esc(v).replace(/\n/g,"<br>")}</td></tr>`; }).join("");
  return `<h1>${esc(name)}</h1><div class="meta">版 ${esc(s.ver||"")}　／　最終更新日時 ${esc(fmtDateTime(cur().updated_at))}　／　出力日時 ${esc(fmtDateTime(nowIso()))}</div><table>${rows}</table>`;
}
$("#pdfBtn").onclick=()=>{
  $("#sowPrint").innerHTML=buildSowHtml();
  const old=document.title; document.title=(cur().name||"project")+"_SOW_"+((cur().sow&&cur().sow.ver)||"");
  document.body.classList.add("print-sow"); window.print(); document.body.classList.remove("print-sow"); document.title=old;
  toast("印刷ダイアログで「PDFとして保存」を選んでください");
};

/* ===================== ログイン時ブリーフィング ===================== */
function ackKey(){ return "pm_acksow_"+(currentUser?currentUser.id:"x")+"_"+store.current; }
function todayMid(){ const d=new Date(); d.setHours(0,0,0,0); return d; }
const SOW_LABELS={name:"プロジェクト名",client:"クライアント",vendor:"受注者",date:"作成日",pm:"PM",ver:"バージョン",bg:"背景",goal:"目的・ゴール",in:"対象範囲",out:"対象外",deliv:"成果物",assume:"前提条件",team:"体制",start:"開始予定日",end:"完了予定日",cost:"契約金額",pay:"支払条件",ms:"マイルストーン",note:"備考"};
function sowDiff(){
  let prev={}; try{ prev=JSON.parse(localStorage.getItem(ackKey())||"{}"); }catch(e){}
  const cu=cur().sow||{},diffs=[];
  SOW_FIELDS.forEach(f=>{ if((prev[f]||"")!==(cu[f]||"")) diffs.push({label:SOW_LABELS[f]||f,from:prev[f]||"",to:cu[f]||""}); });
  return diffs;
}
function todaysTasks(){ const t0=todayMid(); return cur().tasks.filter(t=>{ const s=parseDate(t.start),e=parseDate(t.end); return s&&e&&s<=t0&&t0<=e&&(t.progress||0)<100&&(t.level||1)>=2; }); }
function attentionTasks(){ const t0=todayMid(),in7=addDays(t0,7);
  const late=cur().tasks.filter(t=>{const e=parseDate(t.end);return e&&e<t0&&(t.progress||0)<100&&(t.level||1)>=2;});
  const soon=cur().tasks.filter(t=>{const s=parseDate(t.start);return s&&s>t0&&s<=in7&&(t.level||1)>=2;});
  return {late,soon}; }
function runBriefing(){
  if(!store.current) return;
  const steps=[]; const diffs=sowDiff(); const firstAck=(localStorage.getItem(ackKey())===null);
  if(diffs.length && !firstAck){
    steps.push({title:"📄 SOW（作業範囲）に変更があります", html:
      "<p>前回の確認以降にSOWが更新されました。変更点を確認してください。</p><ul>"+
      diffs.map(d=>`<li><b>${esc(d.label)}</b>：<br><span style="color:#b42318">${esc(d.from)||"（空）"}</span><br>→ <span style="color:#16a34a">${esc(d.to)||"（空）"}</span></li>`).join("")+"</ul>"});
  }
  const tt=todaysTasks();
  steps.push({title:"🗓 今日やるべきタスク", html: tt.length? "<ul>"+tt.map(t=>`<li>${esc(t.title)} <span style="color:#6b7686">（〜${esc(t.end)}${t.assignee?"・"+esc(t.assignee):""}）</span></li>`).join("")+"</ul>" : "<p>本日が対象期間のタスクはありません。</p>"});
  const at=attentionTasks();
  steps.push({title:"🔔 タスクのお知らせ", html:
    `<p><b>遅延（期限超過・未完了）：${at.late.length}件</b></p>`+(at.late.length?"<ul>"+at.late.map(t=>`<li style="color:#b42318">${esc(t.title)}（〜${esc(t.end)}）</li>`).join("")+"</ul>":"")+
    `<p style="margin-top:10px"><b>まもなく開始（7日以内）：${at.soon.length}件</b></p>`+(at.soon.length?"<ul>"+at.soon.map(t=>`<li>${esc(t.title)}（${esc(t.start)}〜）</li>`).join("")+"</ul>":"")});
  let i=0; const ov=$("#briefing");
  function render(){ const s=steps[i]; $("#brfStep").textContent=(i+1)+" / "+steps.length; $("#brfTitle").textContent=s.title; $("#brfBody").innerHTML=s.html; $("#brfBtn").textContent=(i<steps.length-1)?"了解 → 次へ":"了解して作業を開始"; }
  $("#brfBtn").onclick=()=>{ i++; if(i>=steps.length){ ov.style.display="none"; try{ localStorage.setItem(ackKey(),JSON.stringify(cur().sow||{})); }catch(e){} } else render(); };
  render(); ov.style.display="flex";
}

/* ===================== 初期描画 ===================== */
function renderAll(){ if(!store.current)return; renderProjSelect(); renderSow(); renderWbs(); renderGantt(); }

/* ===================== 起動 ===================== */
(async function init(){
  const {data}=await db.auth.getSession();
  if(data && data.session){ showApp(data.session); } else { showLogin(); }
})();
</script>
